name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: Rust workspace gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout exact d2b client toolkit source
        run: |
          git init ../d2b-client-toolkit
          git -C ../d2b-client-toolkit remote add origin https://github.com/vicondoa/d2b-toolkit
          git -C ../d2b-client-toolkit fetch --depth 1 origin 3d6b75d47c8df66c1722ea324d64334a127d43ec
          git -C ../d2b-client-toolkit checkout --detach FETCH_HEAD

      - name: Install GTK system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: QML embedded smoke
        run: cargo test -p wlcontrol-ui qml_source_smoke -- --nocapture

  flake:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Flake evaluation
        run: nix flake check --no-build --all-systems
