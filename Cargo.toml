[workspace]
resolver = "2"
members = [
    "crates/wlcontrol-core",
    "crates/wlcontrol-d2b",
    "crates/wlcontrol-waybar",
    "crates/wlcontrol-ui",
    "crates/wlcontrol-cli",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.94"
license = "Apache-2.0"
repository = "https://github.com/vicondoa/d2b-wlcontrol"
authors = ["vicondoa"]

[workspace.dependencies]
# Internal crates
wlcontrol-core = { path = "crates/wlcontrol-core" }
wlcontrol-d2b = { path = "crates/wlcontrol-d2b" }

# Shared d2b desktop toolkit crates.
d2b-client = { path = "../d2b-toolkit/crates/d2b-client", version = "=0.2.0" }
d2b-toolkit-core = { path = "../d2b-toolkit/crates/d2b-toolkit-core", version = "=0.2.0" }
d2b-wayland-core = { path = "../d2b-toolkit/crates/d2b-wayland-core", version = "=0.2.0" }
d2b-wayland-waybar = { path = "../d2b-toolkit/crates/d2b-wayland-waybar", version = "=0.2.0" }

# Shared third-party dependencies. Versions are pinned at the workspace
# level so every crate speaks the same serde / error surface.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
png = "0.17"

clap = { version = "4", features = ["derive"] }
nix = { version = "0.29", features = ["socket", "uio"] }
directories = "5"
futures = "0.3"

[workspace.metadata.d2b-toolkit]
version = "0.2.0"
tag = "v0.2.0"
rev = "fde6af8b842718e7150f5056d4eba73093d4ad77"

[profile.release]
opt-level = 2
lto = "thin"
strip = true
